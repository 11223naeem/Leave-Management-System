<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: linear-gradient(135deg, #1f1c2c, #928dab);
    --accent: #ff4b5c;
    --text: #fff;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    background: var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Background animation */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,75,92,0.2) 10%, transparent 10%);
    background-size: 50px 50px;
    animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-50px,-50px); }
}

/* Glass Card */
.login-card {
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    text-align: center;
    color: var(--text);
    animation: fadeIn 1s ease-in-out;
}

/* Fade animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Title */
.login-card h2 {
    margin-bottom: 10px;
    color: var(--accent);
}

/* Input */
.login-card input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-bottom: 15px;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

.login-card input::placeholder {
    color: #ccc;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: var(--accent);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #ff1e3c;
    transform: scale(1.08);
    box-shadow: 0 0 15px #ff4b5c;
}

/* Create Account Button */
.create-btn {
    display: block;
    margin-top: 15px;
    padding: 10px;
    border-radius: 30px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    text-decoration: none;
    transition: 0.3s;
}

.create-btn:hover {
    background: var(--accent);
    color: #fff;
}

/* Error */
.error {
    color: #ffb3b3;
    font-size: 0.9rem;
    margin-bottom: 10px;
}


</style>
</head>

<body>

<div class="login-card">
    <h2> Leave Management System</h2>
	<h3>welcome Back!</h3>
	<h4> Login to your account</h4>

    <!-- Error message -->
    <p class="error" th:text="${error}"></p>

    <form action="/AdminloginAccounts">
        <input type="text" name="name" placeholder="User Name" required>
		<input type="text" name="pass" placeholder="Password" required>
        <button type="submit" class="login-btn">Login</button>
    </form>
	
	

    <a href="/AdmincreateAccount" class="create-btn">Create New Account</a>
</div>

</body>
</html>
