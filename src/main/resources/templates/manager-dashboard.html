<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f6fa;
}

/* Sidebar */
.sidebar {
    width: 200px;
    height: 100vh;
    background: #1e2a38;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h3 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: white;
    margin: 10px 0;
    text-decoration: none;
}

/* Main */
.main {
    margin-left: 220px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 5px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* Status Colors */
.approved { color: green; font-weight: bold; }
.rejected { color: red; font-weight: bold; }
.pending { color: orange; font-weight: bold; }

/* Button */
.btn {
    background: #2ecc71;
    color: white;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
}
</style>

<script>
function logout() {
    fetch("/logout")
    .then(() => {
        window.location.href = "/";
    });
}
</script>

</head>
<body>

<div class="sidebar">
    <h3>LMS</h3>
    <a href="/dashboard">Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

    <div class="card">
		<h2>Pending Leave Requests</h2>

		<table>
		<tr>
		    <th>Employee</th>
		    <th>Type</th>
		    <th>From</th>
		    <th>To</th>
		    <th>Status</th>
		    <th>Action</th>
		</tr>

		<tr th:each="l : ${leaves}">
		    <td th:text="${l.username}"></td>
		    <td th:text="${l.type}"></td>
		    <td th:text="${l.fromDate}"></td>
		    <td th:text="${l.toDate}"></td>
		    <td th:text="${l.status}"></td>

		    <td>
		        <!-- APPROVE -->
		        <a th:href="@{/updateStatus(id=${l.id}, action='approve')}">
		            <button style="background:green;color:white;">✔</button>
		        </a>

		        <!-- REJECT -->
		        <a th:href="@{/updateStatus(id=${l.id}, action='reject')}">
		            <button style="background:red;color:white;">✖</button>
		        </a>
		    </td>
		</tr>
		</table>

        

    </div>

</div>

</body>
</html>
