<!DOCTYPE html>
<html>
<head>
<title>Apply Leave</title>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
}

.container {
    width: 400px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 5px;
}

h2 {
    text-align: center;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}

.btn {
    background: #2ecc71;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    width: 100%;
}

.btn-reset {
    background: gray;
    margin-top: 5px;
}
</style>

<script>
function resetForm() {
    document.getElementById("form").reset();
}
</script>

</head>
<body>

<div class="container">

    <h2>Apply Leave</h2>

    <form id="form" action="/saveLeave" method="post">

        <label>Leave Type</label>
        <select name="type">
            <option value="">-- Select Leave Type --</option>
            <option value="Casual">Casual Leave</option>
            <option value="Sick">Sick Leave</option>
			<option value="Emergency">Emergency Leave</option>
			    <option value="Unpaid">Unpaid Leave</option>
			    <option value="Study">Study Leave</option>
				<option value="Study">Other Leave</option>
        </select>

        <label>From Date</label>
        <input type="date" name="fromDate" required>

        <label>To Date</label>
        <input type="date" name="toDate" required>

        <label>Reason</label>
        <textarea name="reason" placeholder="Enter reason" required></textarea>

        <button type="submit" class="btn">Apply Leave</button>
        <button type="button" onclick="resetForm()" class="btn btn-reset">Reset</button>

    </form>

</div>

</body>
</html>
